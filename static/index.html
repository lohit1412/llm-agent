<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATHENA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">

        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-top">
                <div class="brand">
                    <span class="brand-name">ATHENA</span>
                </div>
                <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">◐</button>
            </div>

            <button class="new-chat-btn" onclick="newChat()">
                <span>+</span>
                <span>New conversation</span>
            </button>

            <div class="sidebar-section-label">Recent</div>
            <ul class="conversation-list" id="conversationList">
                <li class="conv-placeholder">No conversations yet</li>
            </ul>

            <div class="sidebar-footer">Personal companion</div>
        </nav>

        <!-- Main -->
        <main class="main">

            <header class="main-header">
                <div class="header-left">
                    <div class="header-greeting" id="headerGreeting"></div>
                    <div class="header-date" id="headerDate"></div>
                </div>
            </header>

            <!-- Briefing Panel -->
            <div class="briefing-panel" id="briefingPanel">
                <div class="briefing-top">
                    <span class="briefing-label">Today's briefing</span>
                    <div class="briefing-actions">
                        <button onclick="loadBriefing()" title="Refresh">↻</button>
                        <button onclick="toggleBriefing()" id="collapseBtn" title="Collapse">−</button>
                    </div>
                </div>
                <div class="briefing-body" id="briefingBody">
                    <div class="briefing-content" id="briefingContent">
                        <div class="briefing-loading">Loading your briefing<span class="dots"><span>.</span><span>.</span><span>.</span></span></div>
                    </div>
                    <div class="quick-stats" id="quickStats">
                        <div class="stat-chip" id="statTasks">◈ — tasks</div>
                        <div class="stat-chip" id="statEvents">◷ — events</div>
                        <div class="stat-chip" id="statGoals">◎ — goals</div>
                    </div>
                </div>
            </div>

            <!-- Chat -->
            <div class="chat-wrap">
                <div class="messages" id="messages">
                    <div class="welcome" id="welcomeMsg">
                        <div class="welcome-glyph">
                            <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" width="48" height="48">
                                <ellipse cx="24" cy="28" rx="15" ry="16" stroke="currentColor" stroke-width="1.2"/>
                                <circle cx="17" cy="24" r="5" stroke="currentColor" stroke-width="1.2"/>
                                <circle cx="31" cy="24" r="5" stroke="currentColor" stroke-width="1.2"/>
                                <circle cx="17" cy="24" r="1.8" fill="currentColor"/>
                                <circle cx="31" cy="24" r="1.8" fill="currentColor"/>
                                <path d="M19 13 C19 9 24 7 24 7 C24 7 29 9 29 13" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                                <path d="M14 14 L10 10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                                <path d="M34 14 L38 10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                                <path d="M20 33 Q24 37 28 33" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                            </svg>
                        </div>
                        <p class="welcome-primary">How can I help you?</p>
                        <p class="welcome-secondary">Ask anything, or review your briefing above</p>
                    </div>
                </div>

                <div class="input-zone">
                    <div class="input-box">
                        <textarea
                            id="messageInput"
                            placeholder="Message Athena..."
                            rows="1"
                            onkeydown="handleKeyDown(event)"
                            oninput="autoResize(this)"></textarea>
                        <button class="send-btn" onclick="sendMessage()" id="sendBtn">
                            <svg viewBox="0 0 20 20" fill="none" width="18" height="18">
                                <path d="M3 10L17 10M17 10L11 4M17 10L11 16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>
                    </div>
                    <div class="input-hint">↵ to send · ⇧↵ new line</div>
                </div>
            </div>

        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
